name: Deploy CTF Challenge to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Langkah 1: Kirim file via SCP
      - name: Copy Files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }} # <-- TAMBAHKAN BARIS INI
          port: 22
          source: "web-broken-access/*"
          target: "/home/${{ secrets.VPS_USER }}/ctf-challenges"

      # Langkah 2: Eksekusi Docker Compose via SSH
      - name: Run Docker Compose on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }} # <-- TAMBAHKAN BARIS INI ALSO
          port: 22
          script: |
            cd /home/${{ secrets.VPS_USER }}/ctf-challenges/web-broken-access
            docker compose down || true
            docker compose up -d --build
