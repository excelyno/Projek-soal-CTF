name: Deploy CTF Challenge to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Langkah 1: Kirim file via SCP
      - name: Copy Files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: 22
        source: "web-broken-access/*,web-crypto-failure/*" # <-- UBAH INI (Pakai koma tanpa spasi)
        target: "/home/${{ secrets.VPS_USER }}/ctf-challenges"

      - name: Run Docker Compose on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: 22
        script: |
          # Deploy Soal 1
          cd /home/${{ secrets.VPS_USER }}/ctf-challenges/web-broken-access
          docker compose up -d --build

          # Deploy Soal 2
          cd /home/${{ secrets.VPS_USER }}/ctf-challenges/web-crypto-failure
          docker compose up -d --build
