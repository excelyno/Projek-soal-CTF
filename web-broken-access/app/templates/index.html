<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Note System v1.0</title>
    <style>
        body { font-family: monospace; background: #141414; color: #00ff66; padding: 50px; }
        .container { border: 1px solid #00ff66; padding: 20px; max-width: 600px; box-shadow: 0 0 10px #00ff66; }
        button { background: #00ff66; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Sistem Catatan Internal</h2>
        <p>User Role: <strong>{{ role }}</strong></p>
        <hr>
        <button onclick="loadNote()">Buka Catatan Saya</button>
        <div id="result" style="margin-top: 20px; color: #ffffff;"></div>
    </div>

    <script>
        function loadNote() {
            // Frontend secara default meminta id=2 milik guest
            fetch('/api/v1/notes?id=2')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('result').innerText = "Konten: " + data.content;
                });
        }
    </script>
</body>
</html>
