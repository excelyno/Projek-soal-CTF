<!DOCTYPE html>
<html lang="en">
<head>
    <title>Network Ping Diagnostics</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #0c0f12; color: #00ffcc; padding: 40px; }
        .box { border: 1px solid #00ffcc; padding: 25px; max-width: 700px; margin: auto; background: #131920; }
        input { width: 70%; padding: 10px; background: #0c0f12; color: #fff; border: 1px solid #00ffcc; }
        button { background: #00ffcc; color: #0c0f12; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        pre { background: #000; padding: 15px; color: #fff; border-radius: 4px; overflow-x: auto; border: 1px solid #333; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🌐 Ping Diagnostic Utility v1.0</h2>
        <p>Masukkan IP Address atau Hostname untuk melakukan pengecekan latensi jaringan.</p>
        <form method="POST">
            <input type="text" name="ip" placeholder="e.g. 127.0.0.1" required>
            <button type="submit">Jalankan Ping</button>
        </form>
        
        {% if result %}
        <h3>Output Sistem:</h3>
        <pre>{{ result }}</pre>
        {% endif %}
    </div>
</body>
</html>
