<!DOCTYPE html>
<html lang="en">
<head>
    <title>Admin Portal v2.0</title>
    <style>
        body { font-family: monospace; background: #0d1117; color: #58a6ff; padding: 50px; text-align: center; }
        .login-box { border: 1px solid #30363d; padding: 30px; display: inline-block; background: #161b22; border-radius: 6px; }
        input { display: block; margin: 10px auto; padding: 8px; background: #0d1117; color: #fff; border: 1px solid #30363d; }
        button { background: #238636; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🔒 Admin Secure Login</h2>
        {% if error %}<p style="color: #f85149;">{{ error }}</p>{% endif %}
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
